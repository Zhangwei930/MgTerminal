name: build-android

# Build MagiesTerminal companion APK and attach it to the public release.
# Triggered on version tags together with the desktop build-packages workflow.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9A-Za-z]*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Upload APK to the public MgTerminal-releases tag matching this ref"
        type: boolean
        default: true

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

# contents:write is required for the optional source-repo release attach step
# (softprops/action-gh-release with github.token). Public APK upload uses
# RELEASE_TOKEN against JasonZhangDad/MgTerminal-releases instead.
permissions:
  contents: write

jobs:
  apk:
    name: build-android-apk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Install npm deps
        run: npm ci

      - name: Build web + debug APK
        run: |
          npm run build
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Stage release-named APK
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          # Prefer root package version when tagging desktop releases
          if [[ -f ../package.json ]]; then
            ROOT_VER="$(node -p "require('../package.json').version")"
            if [[ "$ROOT_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              VERSION="$ROOT_VER"
            fi
          fi
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DEST="MagiesTerminal-${VERSION}-android.apk"
          cp "$SRC" "$DEST"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APK_PATH=mobile/$DEST" >> "$GITHUB_ENV"
          ls -lh "$DEST"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: magiesTerminal-android
          path: mobile/MagiesTerminal-*-android.apk
          if-no-files-found: error

      - name: Attach APK to public release
        if: |
          startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        uses: softprops/action-gh-release@v2
        with:
          repository: JasonZhangDad/MgTerminal-releases
          tag_name: ${{ github.ref_name }}
          files: mobile/MagiesTerminal-*-android.apk
          fail_on_unmatched_files: true
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Attach APK to source-repo release (legacy bridge)
        # Best-effort: primary distribution is MgTerminal-releases. Do not fail
        # the job if this repo cannot create/update a release yet (e.g. race
        # with build-packages) or if token scope is limited.
        continue-on-error: true
        if: |
          startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: mobile/MagiesTerminal-*-android.apk
          fail_on_unmatched_files: true
          token: ${{ github.token }}
