name: test

on:
  pull_request:
  push:
    branches:
      - "**"

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install shell test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (baseline-gated)
        run: npm run typecheck:baseline

      - name: Verify generated MagiesTerminal tool specs
        run: |
          npm run generate:capability-tools
          git diff --exit-code infrastructure/ai/harness/generated/magiesTerminalToolSpecs.json

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Coverage summary
        run: |
          echo '### Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx c8 report --reporter=text-summary >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
